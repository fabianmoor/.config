general {
    lock_cmd = swaylock --screenshots --clock --indicator --effect-blur 7x5 --fade-in 0.2  # command to run when locking
    before_sleep_cmd = loginctl lock-session   # lock before sleep
    after_sleep_cmd = hyprctl dispatch dpms on # turn on screen after sleep
}

# Screen dim after 2.5 minutes
listener {
    timeout = 120                # seconds
    on-timeout = brightnessctl -s set 0%
    on-resume = brightnessctl -r
}

# Lock screen after 5 minutes
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Turn off display after 10 minutes
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 30 minutes
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
